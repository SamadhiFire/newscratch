display_name: Spaceplayax Content Batch
short_description: Build a Spaceplayax content batch zip with Markdown articles, regenerated WebP covers, per-post manifests, and one batch manifest.
default_prompt: Build a Spaceplayax content batch zip from the prepared article JSON. Invoke pwsh -File ./scripts/build_spaceplayax_batch.ps1 with regenerated WebP cover images, resume enabled, and a conservative worker count. Validate that the zip contains exactly one top-level directory and that every post has manifest.json, article.md, and images/cover.webp. Do not publish to Feishu or Lark.

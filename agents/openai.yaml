display_name: GNews To Lark Base
short_description: Fetch international news via GNews API, score, generate English article drafts, and write to Feishu Base.
default_prompt: Use GNews API from the GNEWS_API_KEY environment variable to fetch the previous 7 days of international news for 科技AI, 娱乐体育, 旅游, and 美食. Score each item (relevance + novelty + completeness = total), generate English article drafts (600-1000 chars) and image prompts, and write records to the configured Feishu Base table. AI评分 field gets the total score number only; AI评价内容 gets the detailed breakdown.

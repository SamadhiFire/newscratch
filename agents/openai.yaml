display_name: GNews To Lark Base
short_description: Fetch and score GNews articles, use the model to write publishable English copy, and write finished records to Feishu Base.
default_prompt: Fetch the previous 7 days of GNews articles for 科技AI, 娱乐体育, 旅游, and 美食. Use the scripts to fetch/filter/score/select, then use the model to generate records.normalized.json with rewritten English headlines, 600-1000 character formal English news bodies, and 16:9 image prompts. Dry-run the Lark payload before publishing to the configured Feishu Base.
